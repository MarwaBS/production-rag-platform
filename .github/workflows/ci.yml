name: CI

# This repo is a runnable reference service built on the published rag-llm-infra
# package, plus its deployment infrastructure. CI proves all of it: the service
# installs + its integration tests pass, the image builds, and the IaC validates.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - name: Install (pulls rag-llm-infra from PyPI)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type-check
        run: mypy app tests
      - name: Integration tests
        run: pytest -q

  iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint + render
        run: |
          helm lint deploy/helm
          helm template release deploy/helm > /dev/null
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/Dockerfile
          failure-threshold: error

  docker:
    runs-on: ubuntu-latest
    needs: [test, iac]
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/marwabs/production-rag-platform
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (load locally for scan + SBOM)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          load: true
          tags: ${{ env.IMAGE }}:ci
      - name: Trivy image scan (fail on fixable HIGH/CRITICAL)
        # Pinned to a release tag (not @master) so a scanner change can't silently
        # alter the gate, matching the rest of the pinned actions in this file.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:ci
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push scanned image to GHCR (latest + commit SHA)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
