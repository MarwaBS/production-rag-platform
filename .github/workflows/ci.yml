name: CI

# This repo is a runnable reference service built on the published rag-llm-infra
# package, plus its deployment infrastructure. CI proves all of it: the service
# installs + its integration tests pass, the image builds, and the IaC validates.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - name: Install (pulls rag-llm-infra from PyPI)
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Integration tests
        run: pytest -q

  iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint + render
        run: |
          helm lint deploy/helm
          helm template release deploy/helm > /dev/null
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/Dockerfile
          failure-threshold: error

  docker:
    runs-on: ubuntu-latest
    needs: [test, iac]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image (and push to GHCR on merge to main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ghcr.io/marwabs/production-rag-platform:latest
