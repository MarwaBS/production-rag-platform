name: CI

# This repo is a runnable reference service built on the published rag-llm-infra
# package, plus its deployment infrastructure. CI proves all of it: the service
# installs + its integration tests pass, the image builds, and the IaC validates.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - name: Install (pulls rag-llm-infra from PyPI; dev toolchain pinned)
        # constraints-dev.txt pins ruff/mypy/pytest so a tool release can't
        # break main with zero repo changes.
        run: pip install -e ".[dev]" -c constraints-dev.txt
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type-check
        run: mypy app evals tests
      - name: Integration tests
        run: pytest -q
      - name: Retrieval eval (recall gate enforced in tests/test_eval.py; print the numbers)
        run: python -m evals

  iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint + render
        run: |
          helm lint deploy/helm
          helm template release deploy/helm > /dev/null
      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/Dockerfile
          failure-threshold: error

  docker:
    runs-on: ubuntu-latest
    needs: [test, iac]
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/marwabs/production-rag-platform
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image (load locally for scan + SBOM)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          load: true
          tags: ${{ env.IMAGE }}:ci
      - name: Trivy image scan (fail on fixable HIGH/CRITICAL)
        # Pinned to a release tag (not @master) so a scanner change can't silently
        # alter the gate, matching the rest of the pinned actions in this file.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:ci
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cyclonedx.json
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Read chart appVersion (the tag a bare `helm install` resolves)
        # The Deployment defaults image.tag to .Chart.AppVersion, so that tag
        # MUST exist on GHCR or a default install ImagePullBackOffs. Deriving it
        # here from the same Chart.yaml keeps CI and the chart in lockstep.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: chart
        run: |
          v="$(awk -F'"' '/^appVersion:/ {print $2}' deploy/helm/Chart.yaml)"
          test -n "$v"  # fail loudly rather than pushing a malformed empty tag
          echo "app_version=$v" >> "$GITHUB_OUTPUT"
      - name: Push scanned image to GHCR (latest + commit SHA + chart appVersion)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ steps.chart.outputs.app_version }}
