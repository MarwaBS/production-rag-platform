# CI/CD pipeline STRUCTURE — ILLUSTRATIVE DOCUMENTATION, NOT AN EXECUTED WORKFLOW.
#
# This sketches the fuller pipeline of the PRIVATE production system (ResumeForge).
# It is intentionally kept under docs/ (not .github/workflows/) so it never runs here,
# and it references components that live in that private codebase — e.g.
# requirements-dev.txt, an `evals` module + evaluation gate, integration-marked tests,
# and mypy --strict — which are NOT part of this repository. This repo's real,
# executed CI is .github/workflows/ci.yml (lint · mypy · tests · helm lint/render ·
# hadolint · image build · Trivy scan · CycloneDX SBOM). No secrets appear in source.

name: CI/CD

on:
  push: { branches: [main] }
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff mypy
      - run: ruff check .
      - run: mypy --strict app

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install bandit pip-audit
      - run: bandit -r app -s B101
      - run: pip-audit

  test:
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements-dev.txt
      - run: pytest -m "not integration" --cov=app --cov-fail-under=75

  integration:
    runs-on: ubuntu-latest
    needs: [test]
    services:
      redis: { image: redis:7-alpine, ports: ["6379:6379"] }
    steps:
      - uses: actions/checkout@v4
      - run: pytest -m integration

  evals:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      # Golden-dataset evaluation gate — fails the build on a quality regression.
      - run: python -m evals.gate

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: helm lint deploy/helm

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f deploy/Dockerfile -t rag-platform:ci .
      - name: Trivy image scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "rag-platform:ci"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
