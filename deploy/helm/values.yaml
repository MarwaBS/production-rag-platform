# Reference defaults for the production RAG platform Helm chart — override per
# environment (image, host, resources). `helm lint` + `helm template` validate
# this chart in CI on every push.
replicaCount: 2

image:
  repository: ghcr.io/marwabs/production-rag-platform
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

ingress:
  enabled: true
  className: nginx
  host: rag-platform.example.com

env:
  APP_ENV: production

# Secrets (OPENAI_API_KEY, REDIS_URL, ...) are provided through a Kubernetes Secret,
# never through values. See templates/secret.yaml for the referenced Secret name.
