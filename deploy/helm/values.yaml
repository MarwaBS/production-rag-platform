# Reference defaults for the production RAG platform Helm chart — override per
# environment (image, host, resources). `helm lint` + `helm template` validate
# this chart in CI on every push.
#
# IMPORTANT — single replica by design. The reference service holds its document
# index IN PROCESS (one vector store per pod, see app/main.py). A second pod would
# start with an empty index until it received its OWN /index call, and /query
# against it would return 409 "index documents first". Horizontal scale-out
# therefore requires an external shared vector store (see
# docs/decisions/001-faiss-over-managed-vector-db.md) and is intentionally out of
# scope for this reference deployment — so replicaCount is 1 and autoscaling is off.
replicaCount: 1

image:
  repository: ghcr.io/marwabs/production-rag-platform
  # Tag strategy — CI pushes THREE tags to GHCR on every merge to main:
  #   :latest, :<commit-sha>, and :<appVersion> (from Chart.yaml).
  # Empty tag -> the Deployment falls back to the chart's appVersion, which CI
  # publishes precisely so a bare `helm install` resolves an image that exists.
  # Both :latest and :<appVersion> are MUTABLE (re-stamped on every main merge);
  # production should pin the immutable :<commit-sha>, or better a digest
  # (repository@sha256:...), for reproducible, rollback-safe deploys.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

# Disabled: the in-process index makes this service single-replica (see note
# above). Enabling the HPA would spin up pods that each answer with an empty
# index. Re-enable only alongside an external shared store.
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 70

# Disabled for a single-replica workload: a PodDisruptionBudget with
# minAvailable=1 over exactly one replica would permanently block voluntary node
# drains (the node could never be cordoned for maintenance).
podDisruptionBudget:
  enabled: false
  minAvailable: 1

ingress:
  enabled: true
  className: nginx
  host: rag-platform.example.com
  # TLS is OFF by default (the reference chart ships no cert). The template ties
  # nginx `ssl-redirect` to this: forcing ssl-redirect WITHOUT a cert produces a
  # 308 redirect to an HTTPS endpoint that can't complete the handshake — a
  # redirect loop. When enabled, the template emits spec.tls (referencing
  # `secretName`) AND, if set, a cert-manager `cluster-issuer` annotation to
  # provision that secret, alongside ssl-redirect="true".
  tls:
    enabled: false
    secretName: rag-platform-tls
    clusterIssuer: ""  # e.g. "letsencrypt-prod"; empty omits the annotation

env:
  # APP_ENV drives the app's own typed settings (app/config.py, APP_-prefixed).
  APP_ENV: production
  # ENV is a SEPARATE knob consumed by the rag-llm-infra package: its logging
  # config keys the single-line-JSON formatter on ENV=prod (not APP_ENV), so
  # without this the deployed pod would emit human-readable dev logs and the
  # "structured JSON logs" claim would be dead in the shipped deploy.
  ENV: prod

# Secrets (e.g. OPENAI_API_KEY for the openai backend, APP_API_KEY to guard
# /index) are provided through a Kubernetes Secret, never through values.
secrets:
  # By default the chart renders an (empty) Secret so a bare `helm install` works
  # in mock mode. For REAL secrets, manage the Secret OUT OF BAND (kubectl create
  # secret / sealed-secret / external-secrets) and set `create: false` —
  # otherwise every `helm upgrade` resets the Secret's data to what's templated
  # here, clobbering the out-of-band values. See templates/secret.yaml.
  create: true
  # base64-encoded key/values, dev/test only — NEVER commit real secrets here:
  data: {}
