# The application's secrets (e.g. OPENAI_API_KEY, APP_API_KEY) are best supplied
# OUT OF BAND — `kubectl create secret`, a sealed-secret, or an external-secrets
# operator — and NEVER templated from values or committed.
#
# Why this is gated on `secrets.create`: a Helm-owned Secret is reconciled on
# every `helm upgrade`. If the chart rendered the Secret here, each upgrade would
# reset its `data` to whatever this template produces (empty by default),
# silently wiping keys an operator created out of band and breaking the running
# app (the Deployment `envFrom`s this Secret). So for real secrets set
# `secrets.create: false` and manage the Secret externally — Helm then never owns
# or clobbers it. `create: true` (default) renders it from `secrets.data` only so
# a bare `helm install` still works in mock mode.
{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
{{- with .Values.secrets.data }}
data:
{{ toYaml . | indent 2 }}
{{- end }}
{{- end }}
