apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Restricted container hardening (Pod Security Standards "restricted"):
          # no privilege escalation, an immutable root filesystem, and all Linux
          # capabilities dropped. The app writes nothing to the root fs (in-memory
          # NumPy store, stdout logging), so /tmp is the only writable mount it
          # needs — backed by an emptyDir below.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-secrets
          env:
            # Render every key under .Values.env (sorted, so the output is
            # deterministic) — hardcoding a single key here is how ENV=prod
            # (the rag-llm-infra JSON-log switch) silently never shipped.
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Readiness targets /health (process up), NOT /ready. The index is
          # populated at runtime via POST /index, so gating pod readiness on
          # /ready (503-until-indexed) would deadlock: the Service would route
          # no traffic to an un-indexed pod, so it could never receive the
          # /index call that makes it ready. /ready is an app-level signal for
          # clients to poll, exposed by the API but intentionally not the probe.
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 20
      volumes:
        # Writable scratch for the read-only-root container (Python/uvicorn temp).
        - name: tmp
          emptyDir: {}
